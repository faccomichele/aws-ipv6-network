AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions IAM Role - Template for deploying repository-specific GitHub Actions roles that assume the shared OIDC provider'

# Stack Name: gha-role-for-aws-ipv6-network-${Environment}

# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this template to your target repository
# 2. Update the ProjectName parameter default to match your repository name
# 3. Optionally adjust Environment parameter if needed
# 4. Add additional managed policies or inline policies as required for your application
# 5. Deploy with: aws cloudformation create-stack --stack-name github-role-for-<repo-name>-<environment> --template-body file://github-iam-role-template.yaml --capabilities CAPABILITY_NAMED_IAM

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Repository Configuration
        Parameters:
          - Organization
          - ProjectName
          - Environment
    ParameterLabels:
      Organization:
        default: GitHub Organization
      ProjectName:
        default: Repository Name
      Environment:
        default: Environment

Parameters:
  Organization:
    Type: String
    Description: GitHub organization name
    Default: faccomichele-org
    MinLength: 1
    MaxLength: 63
    AllowedPattern: ^[a-z0-9-]+$
    ConstraintDescription: Must be lowercase alphanumeric with hyphens only
  
  ProjectName:
    Type: String
    Description: Name of the GitHub repository (change this when copying to another repo)
    Default: aws-ipv6-network
    MinLength: 1
    MaxLength: 100
    AllowedPattern: ^[a-zA-Z0-9._-]+$
    ConstraintDescription: Must be a valid GitHub repository name
  
  Environment:
    Type: String
    Description: Environment/Workspace (dev, stg, prod)
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

Resources:
  # IAM role for GitHub Actions (repository-specific)
  GHARole:
    Type: AWS::IAM::Role
    Properties:
      # Role name will be auto-generated by CloudFormation with stack name prefix
      # This ensures uniqueness and follows AWS naming best practices
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 
                - 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
                - {}
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${Organization}/${ProjectName}:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        # REQUIRED: SSM parameter read policy to retrieve Terraform backend configuration
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-tf-access-${Environment}'
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-ssm-read-${Environment}'
      # Inline policy with required Terraform permissions
      Policies:
        - PolicyName: TerraformDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # EC2/VPC network resource management used by this repository Terraform templates
              - Sid: EC2NetworkManagement
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:DescribeVpcs
                  - ec2:CreateInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:DescribeInternetGateways
                  - ec2:CreateEgressOnlyInternetGateway
                  - ec2:DeleteEgressOnlyInternetGateway
                  - ec2:DescribeEgressOnlyInternetGateways
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:DescribeSubnets
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:ReplaceRouteTableAssociation
                  - ec2:DescribeRouteTables
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:ReplaceRoute
                  - ec2:CreateNetworkAcl
                  - ec2:DeleteNetworkAcl
                  - ec2:DescribeNetworkAcls
                  - ec2:CreateNetworkAclEntry
                  - ec2:DeleteNetworkAclEntry
                  - ec2:ReplaceNetworkAclEntry
                  - ec2:ReplaceNetworkAclAssociation
                  - ec2:DescribeSecurityGroups
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:DescribeTags
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeVpcAttribute
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeAddresses
                  - ec2:DescribeDhcpOptions
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:DescribeNatGateways
                  - ec2:DescribeRegions
                  - ec2:DescribeSecurityGroupRules
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Organization
          Value: !Ref Organization
        - Key: Environment
          Value: !Ref Environment
        - Key: RepositoryURL
          Value: !Sub 'https://github.com/${Organization}/${ProjectName}'
        - Key: Automation
          Value: CloudFormation
        - Key: RepositoryPath
          Value: cloudformation
        - Key: RepositoryFile
          Value: github-iam-role.yaml
        - Key: Description
          Value: !Sub 'IAM role for GitHub Actions in ${Organization}/${ProjectName}'
        - Key: Region
          Value: !Ref 'AWS::Region'

Outputs:
  AwsId:
    Value:
      Fn::Join:
        - ' '
        - - 'ACCOUNT_ID'
          - '='
          - !Ref 'AWS::AccountId'
  RoleSecret:
    Value:
      Fn::Join:
        - ' '
        - - 'ROLE_SECRET'
          - "="
          - Fn::Select:
              - 8
              - Fn::Split:
                  - "-"
                  - !GetAtt GHARole.Arn
